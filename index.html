<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <link rel="icon"
    href="data:image/x-icon;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQEAAAAMAtY9AAAAAXNSR0IArs4c6QAAAKlJREFUKFNjYGA4wMDAnMDAwDCAkQEDmBj+A8mDGAIYGP4DyS0BA4YmDAwYmDAwYmDAwYmDAwMTBv8fGv//PzL+//+f8X8GIA8ofmA48P8/UAHIDBgAAG3/Gv8P/v8PVDMAVQNAAAAA//8DpgAA" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Vanessa Cristina - Gestão de Salão</title>
  <style>
    #root-loading {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #FDFBFB;
      font-family: sans-serif;
      color: #DB2777;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #FBCFE8;
      border-top: 4px solid #DB2777;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        for (let reg of regs) reg.unregister();
      });
    }
  </script>
</head>

<body>
  <div id="root">
    <div id="root-loading">
      <div class="spinner"></div>
      <p>Iniciando sistema...</p>
    </div>
  </div>
  <script type="module" src="./src/main.tsx"></script>
</body>

</html>
