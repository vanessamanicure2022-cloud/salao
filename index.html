<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <link rel="icon"
    href="data:image/x-icon;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQEAAAAMAtY9AAAAAXNSR0IArs4c6QAAAKlJREFUKFNjYGA4wMDAnMDAwDCAkQEDmBj+A8mDGAIYGP4DyS0BA4YmDAwYmDAwYmDAwYmDAwMTBv8fGv//PzL+//+f8X8GIA8ofmA48P8/UAHIDBgAAG3/Gv8P/v8PVDMAVQNAAAAA//8DpgAA" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Vanessa Cristina - Gestão de Salão</title>
  <style>
    #root-loading {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #FFF1F2;
      font-family: sans-serif;
      color: #DB2777;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #FBCFE8;
      border-top: 4px solid #DB2777;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    #debug-reporter {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #ef4444;
      color: white;
      padding: 15px;
      font-size: 12px;
      z-index: 10000;
      display: none;
      word-break: break-all;
    }
  </style>
  <script>
    window.onerror = function (msg, url, line, col, error) {
      var reporter = document.getElementById('debug-reporter');
      if (reporter) {
        reporter.style.display = 'block';
        reporter.innerText = 'ERRO (V1.2): ' + msg + (url ? '\nLocal: ' + url + ':' + line : '');
      }
      return false;
    };
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        for (let reg of regs) reg.unregister();
      });
    }
  </script>
</head>

<body>
  <div id="debug-reporter"></div>
  <div id="root">
    <div id="root-loading">
      <div class="spinner"></div>
      <p style="font-weight: bold; margin-bottom: 5px;">SISTEMA V1.2 - AGUARDE...</p>
      <p style="font-size: 10px; opacity: 0.7;">Se demorar, limpe o cache do navegador.</p>
    </div>
  </div>
  <script type="module" src="./src/main.tsx"></script>
</body>

</html>
